<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Primo Piano – Benvenuti</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    /* Effetto hover sull'immagine */
    .header img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.35s ease;
    }

    a:hover .header img {
      transform: scale(1.03);
    }

    .content {
      padding: 22px;
      text-align: center;
    }

    .address {
      font-size: 0.9rem;
      color: #555555;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .note {
      font-size: 0.8rem;
      color: #999999;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="card">

    <!-- Immagine cliccabile -->
    <a href="Al_Primo_Piano_Benvenuti.pdf" target="_blank" rel="noopener">
      <div class="header">
        <img src="biglietto_forio.png" alt="Al Primo Piano - Skyline Forio d'Ischia" />
      </div>
    </a>

    <div class="content">
      <p class="address">
        Via Gaetano Morgera 96<br />
        80075 Forio (NA)
      </p>

      <p class="note">
        Tocca l’immagine per aprire il manuale PDF di benvenuto.
      </p>
    </div>

  </div>
</body>
</html>
