<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Primo Piano – Benvenuti</title>
    <style>
        body {
            margin: 0;
            background-color: #f7f7f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        img {
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.22);
            cursor: pointer;
            transition: 
                transform 0.35s ease,
                box-shadow 0.35s ease,
                filter 0.35s ease;
        }

        img:hover {
            transform: translateY(-6px) scale(1.02) rotateX(2deg);
            box-shadow: 0 16px 32px rgba(0,0,0,0.28);
            filter: brightness(1.03);
        }
    </style>
</head>
<body>
    <a href="Al_Primo_Piano_Benvenuti.pdf" target="_blank">
        <img src="biglietto_forio.png" alt="Manuale di benvenuto">
    </a>
</body>
</html>
